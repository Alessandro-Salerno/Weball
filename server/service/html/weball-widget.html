<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Weball Widget Subdocument</title>

    <link rel="stylesheet" href="http://155.94.252.86:8081/css/weball-widget-styles.css">
</head>
<body onload="onLoad()toggletoggle">
    <script type="application/javascript" src="http://155.94.252.86:8081/js/weball-control.js"></script>
    <div id="weball-widget" class="flex">
        <div id="weball-banner">
            <h1 class="weball-centered">Weball</h1>
            <input type="button" id="weball-login-button" value="Login o Registrati" onclick="weballLogin()">
        </div>

        <div id="weball-buttons">
            <input type="button" class="weball-widget-button" id="inverti-colori" value="INVERTI COLORI" onclick="toggle('inverted')">
            <input type="button" class="weball-widget-button" id="scala-di-grigi" value="SCALA DI GRIGI" onclick="toggle('grayScale')">
            <input type="button" class="weball-widget-button" id="contrasto" value="CONTRASTO" onclick="toggle('contrast')">
            <input type="button" class="weball-widget-button" id="saturazione" value="SATURAZIONE" onclick="toggle('saturation')">
            <input type="button" class="weball-widget-button" id="luminosita" value="LUMINOSITÀ" onclick="toggle('brightness')">
            <input type="button" class="weball-widget-button" id="epilessia" value="EPILESSIA" onclick="toggle('sepia')">
            <input type="button" class="weball-widget-button" id="evidenzia-link" value="EVIDENZIA LINK" onclick="toggle('highlightLinks')">
            <input type="button" class="weball-widget-button" id="caratteri-dislessia" value="CARATTERI DISLESSIA" onclick="toggle('dyslexia')">
            <input type="button" class="weball-widget-button" id="cursore-grande" value="CURSORE GRANDE" onclick="toggle('zoomPointer')">
            <input type="button" class="weball-widget-button" id="zoom" value="ZOOM" onclick="toggle('zoom')">
            <input type="button" class="weball-widget-button" id="silenzia-suoni" value="SILENZIA SUONI" onclick="toggle('muteSounds')">
            <input type="button" class="weball-widget-button" id="weball-widget-exit-button" value="CHIUDI" onclick="noWeball()">
        </div>
    </div>
</body>
</html>
