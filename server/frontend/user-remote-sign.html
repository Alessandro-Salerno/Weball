<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weball Registration</title>

    <script>
        const submitRegistration = () => {
          const data = {
            firstname: document.getElementById('fn-signup').value,
            lastname: document.getElementById('ln-signup').value,
            email: document.getElementById('em-signup').value,
            password: document.getElementById('pw-signup').value
          };

          fetch("http://155.94.252.86:8081/user/register", {
            method: "POST",
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(data)
          }).then(res => {
            return res.json();
          }).then(response => {
            alert(`${response.status}: ${response.message}`);
            return response;
          }).then(response => {
            if (response.status === 'Success') {
              opener.postMessage({ weballLogin: data, weballSettings: response.settings }, '*');
              window.close();
            }
          });
        }
    
        const submitLogin = () => {
          const data = {
            email: document.getElementById('em-login').value,
            password: document.getElementById('pw-login').value
          };
          
          fetch("http://155.94.252.86:8081/user/settings/get", {
            method: "POST",
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify(data)
          }).then(res => {
            return res.json();
          }).then(response => {
            if (!response || response.status === 'Failed') {
              alert(`${response.status}: ${response.message}`);
              window.location.reload();
            }

            return response;
          }).then(response => {
            opener.postMessage({ weballLogin: data, weballSettings: response.settings }, '*');
            window.close();
          });
        }
    </script>
</head>
<body>
    <h1>Registrati</h1>
    Nome <br>
    <input type="text" id="fn-signup"> <br>
    Cognome <br>
    <input type="text" id="ln-signup"> <br>
    Indirizzo E-Mail <br>
    <input type="text" id="em-signup"> <br>
    Password <br>
    <input type="password" id="pw-signup">
    <br> <br>
    <input type="button" id="signup-buton" value="Registrati" onclick="submitRegistration()">
    
    <h1>Accedi</h1>
    Indirizzo E-Mail <br>
    <input type="text" id="em-login"> <br>
    <br> </br>Password <br>
    <input type="password" id="pw-login">
    <br> <br>
    <input type="button" id="login-buton" value="Accedi" onclick="submitLogin()">
</body>
</html>
